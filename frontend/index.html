<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearpath Support Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.4;
        }

        .message.user {
            background: #e0f7fa;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .message.bot {
            background: #e8eaf6;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }

        .error-label {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 8px;
            font-size: 13px;
            margin-top: 10px;
            border-radius: 4px;
            font-weight: bold;
            display: block;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            background: white;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
            font-size: 14px;
        }

        .input-area button {
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .input-area button:hover {
            background: #0056b3;
        }

        .debug-panel {
            background: #222;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            border-top: 2px solid #555;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="header">Clearpath Support</div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask a question..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
        <div class="debug-panel" id="debugPanel">
            [Debug Info will appear here]
        </div>
    </div>

    <script>
        // --- CONVERSATION MEMORY ---
        // We store the chat history here to keep the backend completely stateless
        let currentConversationId = null;

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const query = inputField.value.trim();
            if (!query) return;

            addMessage(query, 'user');
            inputField.value = "";

            document.getElementById("debugPanel").innerText = "Thinking...";

            try {
                // Send the required JSON payload to our FastAPI backend
                const payload = { question: query };
                if (currentConversationId) {
                    payload.conversation_id = currentConversationId;
                }

                const response = await fetch("/query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }

                // Create an empty bot message bubble immediately
                const msgDiv = document.createElement("div");
                msgDiv.className = "message bot";
                document.getElementById("messages").appendChild(msgDiv);

                const responseData = await response.json();

                if (responseData.error) {
                    addMessage(responseData.error, 'bot');
                    document.getElementById("debugPanel").innerText = "Error from server.";
                    return;
                }

                // Save the conversation ID for the next turn
                if (responseData.conversation_id) {
                    currentConversationId = responseData.conversation_id;
                }

                let botFullText = responseData.answer || "";
                let debugInfo = responseData.metadata;
                let sourcesList = responseData.sources || [];

                // Do the heavy Markdown parsing now that all text has arrived instantly
                let finalHtml = botFullText;
                finalHtml = finalHtml.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                finalHtml = finalHtml.replace(/\n\d+\.\s/g, (match) => '<br><b>' + match.trim() + '</b> ');
                finalHtml = finalHtml.replace(/\n-\s/g, '<br>• ');
                finalHtml = finalHtml.replace(/\n/g, '<br>');

                // Append Sources if any are present
                if (sourcesList.length > 0) {
                    finalHtml += "<br><br><small style='color: #666;'>Sources:<br>";
                    sourcesList.forEach((src, idx) => {
                        finalHtml += `[${idx + 1}] ${src.document} (Score: ${src.relevance_score.toFixed(2)})<br>`;
                    });
                    finalHtml += "</small>";
                }

                msgDiv.innerHTML = finalHtml;

                // Then, inject the yellow UI warning flag if it was triggered
                if (debugInfo && debugInfo.evaluator_flags && debugInfo.evaluator_flags.length > 0) {
                    for (const flag of debugInfo.evaluator_flags) {
                        let labelText = "⚠️ Low confidence — please verify with support.";
                        let labelColor = "#fff3cd"; // default yellow
                        let textColor = "#856404";

                        if (flag === "refusal" || flag === "no_context") {
                            labelText = "⚠️ Low confidence — please verify with support.";
                        } else if (flag === "low_grounding") {
                            labelText = "⚠️ Low context - might be hallucination. Please verify.";
                        }

                        msgDiv.innerHTML += `<div class="error-label" style="background:${labelColor};color:${textColor};border-color:${labelColor};">${labelText}</div>`;
                    }
                    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
                }

                // Update the debug panel exactly as requested
                if (debugInfo) {
                    const flagsStr = debugInfo.evaluator_flags.length > 0 ? debugInfo.evaluator_flags.join(', ') : 'None';
                    const debugStr = `Model: ${debugInfo.model_used}\nTokens (In/Out): ${debugInfo.tokens.input} / ${debugInfo.tokens.output}\nLatency: ${debugInfo.latency_ms}ms\nEvaluator Flags: ${flagsStr}`;
                    document.getElementById("debugPanel").innerText = debugStr;
                }

            } catch (err) {
                addMessage("Failed to connect to server.", 'bot');
                document.getElementById("debugPanel").innerText = "Connection failed. Is the Python server running?";
            }
        }

        function addMessage(text, sender, isHTML = false) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}`;
            if (isHTML) {
                msgDiv.innerHTML = text;
            } else {
                msgDiv.innerText = text;
            }
            document.getElementById("messages").appendChild(msgDiv);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>

</body>

</html>
